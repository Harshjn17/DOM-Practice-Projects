      <img src="https://images.unsplash.com/photo-1611880147493-7542bdb0f024?w=1400&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTR8fGdpcmxzfGVufDB8fDB8fHww" alt="Image 3">
      <img src="https://plus.unsplash.com/premium_photo-1664541336505-1c1e8c50519b?q=80&w=1470&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Image 4"
    </div>

    <button class="btn prev">&#10094;</button>

  <script src="script.js"></script>

</html>
