<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Character Counter</h1>

    <textarea
      id="text"
      placeholder="Start typing here..."
      maxlength="200"
    ></textarea>

    <div class="stats">
      <div class="card">
        <h2 id="text-count">0</h2>
        <p>Characters</p>
      </div>

      <div class="card">
        <h2 id="max-char"></h2>
        <p>Remaining</p>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
